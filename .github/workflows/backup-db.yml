name: Backup DB

on:
  schedule:
    - cron: "0 3 * * *"   # Tous les jours à 3h UTC
  workflow_dispatch:        # Lancement manuel possible depuis GitHub

jobs:
  backup:
    name: Export CMS + Stats DB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run backup
        run: npx tsx scripts/backup-cms.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.sha }}
          path: backups/
          retention-days: 90   # Conservé 90 jours sur GitHub
